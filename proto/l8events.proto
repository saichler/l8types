syntax = "proto3";
package l8events;
option go_package = "./types/l8events";
import "api.proto";

// ─── Enums ───

// Severity levels — universal across all projects.
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARNING = 2;
  SEVERITY_MINOR = 3;
  SEVERITY_MAJOR = 4;
  SEVERITY_CRITICAL = 5;
}

// Generic alarm lifecycle states.
enum AlarmState {
  ALARM_STATE_UNSPECIFIED = 0;
  ALARM_STATE_ACTIVE = 1;
  ALARM_STATE_ACKNOWLEDGED = 2;
  ALARM_STATE_CLEARED = 3;
  ALARM_STATE_SUPPRESSED = 4;
}

// Generic event processing states.
enum EventState {
  EVENT_STATE_UNSPECIFIED = 0;
  EVENT_STATE_NEW = 1;
  EVENT_STATE_PROCESSED = 2;
  EVENT_STATE_DISCARDED = 3;
  EVENT_STATE_ARCHIVED = 4;
}

// Event categories — covers audit, system, data center infrastructure, and extensible custom.
enum EventCategory {
  EVENT_CATEGORY_UNSPECIFIED = 0;
  EVENT_CATEGORY_AUDIT = 1;         // User action audit trail
  EVENT_CATEGORY_SYSTEM = 2;        // System/infrastructure events
  EVENT_CATEGORY_MONITORING = 3;    // Generic telemetry/monitoring
  EVENT_CATEGORY_SECURITY = 4;      // Login, access, threat events
  EVENT_CATEGORY_INTEGRATION = 5;   // External system events
  EVENT_CATEGORY_CUSTOM = 6;        // Consumer-defined category
  EVENT_CATEGORY_NETWORK = 7;       // Device status, interfaces, routing (BGP/OSPF/MPLS/SR), hardware
  EVENT_CATEGORY_KUBERNETES = 8;    // Pod, node, workload, namespace, network policy
  EVENT_CATEGORY_PERFORMANCE = 9;   // Threshold violations (CPU, memory, temperature, traffic)
  EVENT_CATEGORY_SYSLOG = 10;       // Syslog messages from devices
  EVENT_CATEGORY_TRAP = 11;         // SNMP traps from devices
  EVENT_CATEGORY_COMPUTE = 12;      // Hypervisors, VMs, hosts
  EVENT_CATEGORY_STORAGE = 13;      // Storage arrays, volumes, capacity
  EVENT_CATEGORY_POWER = 14;        // PDUs, UPS, battery, power consumption
  EVENT_CATEGORY_GPU = 15;          // GPU device status, utilization, temperature
  EVENT_CATEGORY_TOPOLOGY = 16;     // Topology changes, link up/down, connectivity
  EVENT_CATEGORY_AUTOMATION = 17;   // Workflow execution, policy compliance
}

// Maintenance window status.
enum MaintenanceStatus {
  MAINTENANCE_STATUS_UNSPECIFIED = 0;
  MAINTENANCE_STATUS_SCHEDULED = 1;
  MAINTENANCE_STATUS_ACTIVE = 2;
  MAINTENANCE_STATUS_COMPLETED = 3;
  MAINTENANCE_STATUS_CANCELLED = 4;
}

// Maintenance recurrence type.
enum RecurrenceType {
  RECURRENCE_TYPE_UNSPECIFIED = 0;
  RECURRENCE_TYPE_NONE = 1;
  RECURRENCE_TYPE_DAILY = 2;
  RECURRENCE_TYPE_WEEKLY = 3;
  RECURRENCE_TYPE_MONTHLY = 4;
}

// ─── Shared Message Types ───

// A generic event occurrence.
// Consumers embed this in their own event types or use it directly.
// Immutable after creation — consumers should reject PUT on event services.
message EventRecord {
  string event_id = 1;
  EventCategory category = 2;
  string event_type = 3;
  EventState state = 4;
  Severity severity = 5;
  string source_id = 6;
  string source_name = 7;
  string source_type = 8;
  string message = 9;
  map<string, string> attributes = 10;
  int64 occurred_at = 11;
  int64 received_at = 12;
  int64 processed_at = 13;
  string generated_alarm_id = 14;
}

// A note/comment attached to an alarm.
message AlarmNote {
  string note_id = 1;
  string author = 2;
  string text = 3;
  int64 created_at = 4;
}

// A state transition record for alarm audit trail.
message AlarmStateChange {
  AlarmState from_state = 1;
  AlarmState to_state = 2;
  string changed_by = 3;
  string reason = 4;
  int64 changed_at = 5;
}

// A generic alarm instance — the core state machine.
// Consumers embed this in their own alarm types or extend it.
message AlarmRecord {
  string alarm_id = 1;
  string definition_id = 2;
  string name = 3;
  string description = 4;
  AlarmState state = 5;
  Severity severity = 6;
  Severity original_severity = 7;
  string source_id = 8;
  string source_name = 9;
  string source_type = 10;
  int64 first_occurrence = 11;
  int64 last_occurrence = 12;
  int32 occurrence_count = 13;
  string dedup_key = 14;
  string event_id = 15;
  string acknowledged_by = 16;
  int64 acknowledged_at = 17;
  string cleared_by = 18;
  int64 cleared_at = 19;
  bool is_suppressed = 20;
  string suppressed_by = 21;
  map<string, string> attributes = 22;
  repeated AlarmNote notes = 23;
  repeated AlarmStateChange state_history = 24;
}

// Archive metadata — added when an alarm or event is archived.
message ArchiveInfo {
  int64 archived_at = 1;
  string archived_by = 2;
  string archive_reason = 3;
}

// A maintenance window — period during which alarms/notifications are suppressed.
// Consumers store this in their own service; l8events provides the type and evaluator.
message MaintenanceWindow {
  string window_id = 1;
  string name = 2;
  string description = 3;
  MaintenanceStatus status = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  string created_by = 7;
  int64 created_at = 8;
  RecurrenceType recurrence = 9;
  int32 recurrence_interval = 10;
  repeated string scope_ids = 11;
  repeated string scope_types = 12;
}

// ─── List Types ───

message EventRecordList {
  repeated EventRecord list = 1;
  l8api.L8MetaData metadata = 2;
}

message MaintenanceWindowList {
  repeated MaintenanceWindow list = 1;
  l8api.L8MetaData metadata = 2;
}
