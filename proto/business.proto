// api.proto defines the core API types for the Layer 8 distributed system.
// This includes query DSL for data filtering, authentication and authorization,
// two-factor authentication (TFA), captcha support, and credential management.

syntax = "proto3";

package l8business;

import "api.proto";

option java_multiple_files = true;
option java_outer_classname = "L8Business";
option java_package = "com.types.l8business";
option go_package = "./types/l8business";

message L8BusinessLabelList {
  repeated L8BusinessLabel list = 1;
  l8api.L8MetaData metadata = 2;
}

message L8BusinessLabel {
  string label_id = 1;
  string label_description = 2;
}