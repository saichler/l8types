// api.proto defines the core API types for the Layer 8 distributed system.
// This includes query DSL for data filtering, authentication and authorization,
// two-factor authentication (TFA), captcha support, and credential management.

syntax = "proto3";

package l8api;

option java_multiple_files = true;
option java_outer_classname = "L8Api";
option java_package = "com.types.l8api";
option go_package = "./types/l8api";

// L8Query represents a query request for filtering and retrieving data elements.
// It supports expression-based criteria, sorting, pagination, and map-reduce operations.
message L8Query {
  // Free-text search string for full-text queries
  string text = 1;
  // The root type name to query against
  string rootType = 2;
  // List of property names to include in the result (projection)
  repeated string properties = 3;
  // The filter criteria expression tree
  L8Expression criteria = 4;
  // Property name to sort results by
  string sort_by = 5;
  // If true, sort in descending order; otherwise ascending
  bool descending = 6;
  // Maximum number of results to return per page
  int32 limit = 7;
  // Page number for pagination (zero-based)
  int32 page = 8;
  // If true, perform case-sensitive matching
  bool match_case = 9;
  // Schema name to filter by (optional)
  string schema = 10;
  // If true, execute as a distributed map-reduce operation
  bool map_reduce = 11;
  // Group-by field names for aggregation queries
  repeated string group_by = 12;
  // HAVING clause — filter on aggregate results (reuses L8Expression)
  L8Expression having = 13;
  // Parsed aggregate functions from the SELECT clause
  repeated L8AggregateFunction aggregates = 14;
}

// L8AggregateFunction represents a parsed aggregate function from the SELECT clause.
// Example: count(*), sum(salary), avg(amount)
message L8AggregateFunction {
  // Function name: "count", "sum", "avg", "min", "max"
  string function = 1;
  // Field name to aggregate ("*" for count(*))
  string field = 2;
  // Display alias for the result (e.g., "count", "sumSalary")
  string alias = 3;
}

// L8Expression represents a node in the query criteria expression tree.
// Expressions can be chained using AND/OR logic and nested with child expressions.
message L8Expression {
  // The condition at this expression node
  L8Condition condition = 1;
  // Logical operator to chain with next expression ("AND" or "OR")
  string and_or = 2;
  // Next expression in the chain (sibling)
  L8Expression next = 3;
  // Nested child expression (for grouping)
  L8Expression child = 4;
}

// L8Condition represents a condition within an expression.
// Conditions contain comparators and can be chained together.
message L8Condition {
  // The comparator defining the comparison operation
  L8Comparator comparator = 1;
  // Operator to chain with next condition
  string oper = 2;
  // Next condition in the chain
  L8Condition next = 3;
}

// L8Comparator defines a single comparison operation.
// Compares a left operand against a right operand using an operator.
message L8Comparator {
  // Left operand (typically a property name)
  string left = 1;
  // Comparison operator (e.g., "=", "!=", ">", "<", ">=", "<=", "LIKE", "IN")
  string oper = 2;
  // Right operand (the value to compare against)
  string right = 3;
}

// AuthUser contains user credentials for authentication requests.
message AuthUser {
  // Username or email for authentication
  string user = 1;
  // Password (should be transmitted over secure channel)
  string pass = 2;
  // Captcha response token for bot protection
  string captcha = 3;
  // Token hash for two phase authentication
  string token_hash = 4;
  // Code
  string code = 5;
}

// AuthToken is the response to an authentication request.
// Contains the session token or error information.
message AuthToken {
  // The authentication token if successful
  string token = 1;
  // Error message if authentication failed
  string error = 2;
  // If true, user needs to set up two-factor authentication
  bool setup_tfa = 3;
  // If true, user needs to provide TFA code to complete login
  bool need_tfa = 4;
  // The token hash in case of two phase authentication.
  string token_hash = 5;
}

// L8MetaData provides metadata and statistics about query results.
// Used for aggregation and analysis of data distribution.
message L8MetaData {
  // Count statistics for primary keys
  L8Count key_count = 1;
  // Count statistics per value, keyed by property name
  map<string, L8Count> value_count = 2;
}

// L8Count holds count statistics as a map of value to count.
message L8Count {
  // Map of value string to occurrence count
  map<string, int32> counts = 1;
}

// L8TypeList contains a list of type names.
message L8TypeList {
  // List of type name strings
  repeated string list = 1;
}

// L8TFASetup is a request to set up two-factor authentication for a user.
message L8TFASetup {
  // The user ID to set up TFA for
  string userId = 1;
}

// L8TFASetupR is the response to a TFA setup request.
// Contains the secret and QR code for authenticator app configuration.
message L8TFASetupR {
  // The TOTP secret key (base32 encoded)
  string secret = 1;
  // QR code image bytes for scanning with authenticator app
  bytes qr = 2;
  // Error message if setup failed
  string error = 3;
}

// L8TFAVerify is a request to verify a two-factor authentication code.
message L8TFAVerify {
  // The user ID being verified
  string userId = 1;
  // The TOTP code from the authenticator app
  string code = 2;
  // Bearer token from initial authentication
  string bearer = 3;
}

// L8TFAVerifyR is the response to a TFA verification request.
message L8TFAVerifyR {
  // True if the code was valid and verification succeeded
  bool ok = 1;
}

// Captcha contains captcha challenge data for bot protection.
message Captcha {
  // Captcha image or challenge data bytes
  bytes captcha = 1;
}

// L8Credential represents a single credential with multiple sides/components.
// Used for storing complex credentials like connection strings or API keys.
message L8Credential {
  // First component of the credential (e.g., host, username)
  string aside = 1;
  // Second component of the credential (e.g., port, password)
  string zside = 2;
  // Third component of the credential (e.g., database, token)
  string yside = 3;
}

// L8CredentialsList is a paginated list of credentials with metadata.
message L8CredentialsList {
  // List of credential sets
  repeated L8Credentials list = 1;
  // Metadata for the result set
  L8MetaData metadata = 2;
}

// L8Credentials represents a named set of credentials.
// Groups related credentials under a single identifier.
message L8Credentials {
  // Unique identifier for this credential set
  string id = 1;
  // Human-readable name for the credential set
  string name = 2;
  // Map of credential key to credential value
  map<string, L8Credential> creds = 3;
}

// L8CredentialsMask represents credentials with masked/encrypted values.
// Used for secure transmission of credential data.
message L8CredentialsMask {
  // Unique identifier for the credential set
  string id = 1;
  // Encrypted or masked credential data
  bytes creds = 2;
}

enum L8PeriodType {
  invalid_period_type = 0;
  Yearly = 1;
  Quarterly = 2;
  Monthly = 3;
}

enum L8PeriodValue {
  invalid_period_value = 0;
  January = 1;
  February = 2;
  March = 3;
  April = 4;
  May = 5;
  June = 6;
  July = 7;
  August = 8;
  September = 9;
  October = 10;
  November = 11;
  December = 12;
  Q1 = 13;
  Q2 = 14;
  Q3 = 15;
  Q4 = 16;
}

message L8Period {
  L8PeriodType period_type = 1;
  int32 period_year = 2;
  L8PeriodValue period_value = 3;
}

message L8TimeSeriesPoint {
  int64 stamp = 1;
  double value = 2;
}

message L8TSDBQuery {
  string property_id = 1;
  int64 tsdbstart = 2;
  int64 tsdbend = 3;
}

message L8CsvExportRequest {
  string model_type = 1;      // Protobuf type name (e.g., "Employee")
  string service_name = 2;    // ServiceName constant (e.g., "Employee")
  int32 service_area = 3;     // ServiceArea (e.g., 30 for HCM)
}

message L8CsvExportResponse {
  string csv_data = 1;        // Full CSV content (headers + rows)
  string filename = 2;        // Suggested filename (e.g., "Employee_2026-02-28.csv")
  int32 row_count = 3;        // Total rows exported
}

message L8FileUploadRequest {
  string file_name = 1;       // Original filename
  string mime_type = 2;       // e.g., "application/pdf"
  bytes file_data = 3;        // File content (base64 in JSON, max 5MB)
  string document_id = 4;     // For storage path organization
  int32 version = 5;          // Version number
}

message L8FileUploadResponse {
  string storage_path = 1;    // Server path where file was stored
  string file_name = 2;       // Original filename
  int64 file_size = 3;        // Size in bytes
  string mime_type = 4;       // MIME type
  string checksum = 5;        // SHA-256 hash
}

message L8FileDownloadRequest {
  string storage_path = 1;    // Path to retrieve
}

message L8FileDownloadResponse {
  bytes file_data = 1;        // File content (base64 in JSON)
  string file_name = 2;       // Original filename
  string mime_type = 3;       // MIME type
  int64 file_size = 4;        // Size in bytes
}

// ========================================
// Data Import
// ========================================

// An import mapping template — maps source columns to target model fields
message L8ImportTemplate {
  string template_id = 1;
  string name = 2;                                    // e.g., "SAP Employee Import"
  string description = 3;
  string target_model_type = 4;                       // Protobuf type name (e.g., "Employee")
  string target_service_name = 5;                     // ServiceName constant
  int32 target_service_area = 6;                      // ServiceArea
  string source_format = 7;                           // "csv", "json", "xml"
  repeated L8ImportColumnMapping column_mappings = 8;
  repeated L8ImportValueTransform value_transforms = 9;
  map<string, string> default_values = 10;            // target_field → default value string
}

message L8ImportTemplateList {
  repeated L8ImportTemplate list = 1;
  L8MetaData metadata = 2;
}

// Maps one source column to one target field
message L8ImportColumnMapping {
  string source_column = 1;       // Header name in source file
  string target_field = 2;        // JSON field name on target protobuf
  bool skip = 3;                  // True = ignore this source column
}

// Value transformation rule for a mapped field
message L8ImportValueTransform {
  string target_field = 1;                // Which target field this applies to
  L8ImportTransformType transform_type = 2;
  string format_pattern = 3;              // e.g., "MM/DD/YYYY" for date parsing
  map<string, string> value_map = 4;      // e.g., {"Active": "1", "Inactive": "2"}
  string default_value = 5;               // Fallback when source is empty
  string concatenate_separator = 6;       // For CONCATENATE type
  repeated string concatenate_fields = 7; // Source columns to join
}

enum L8ImportTransformType {
  IMPORT_TRANSFORM_UNSPECIFIED = 0;
  IMPORT_TRANSFORM_DATE_FORMAT = 1;   // Parse date using format_pattern
  IMPORT_TRANSFORM_ENUM_MAP = 2;      // Map text labels to enum int values
  IMPORT_TRANSFORM_UNIT_CONVERT = 3;  // e.g., dollars→cents (multiply by 100)
  IMPORT_TRANSFORM_TRIM = 4;
  IMPORT_TRANSFORM_UPPERCASE = 5;
  IMPORT_TRANSFORM_LOWERCASE = 6;
  IMPORT_TRANSFORM_DEFAULT = 7;       // Use default_value when source is empty
  IMPORT_TRANSFORM_CONCATENATE = 8;   // Join multiple source columns
  IMPORT_TRANSFORM_SPLIT = 9;         // Split one source column into target field
  IMPORT_TRANSFORM_MONEY = 10;        // Parse currency string into Money
}

// Request AI to suggest column mappings
message L8ImportAIMappingRequest {
  string target_model_type = 1;
  string target_service_name = 2;
  int32 target_service_area = 3;
  repeated string source_columns = 4;    // Headers from uploaded file
  repeated string sample_values = 5;     // First row values (helps AI infer types)
  string source_format = 6;             // "csv", "json", "xml"
}

message L8ImportAIMappingResponse {
  repeated L8ImportColumnMapping suggested_mappings = 1;
  repeated L8ImportValueTransform suggested_transforms = 2;
  float confidence = 3;                  // 0.0-1.0 overall confidence
  string explanation = 4;                // AI explanation of mapping rationale
}

// Execute data import using a template
message L8ImportExecuteRequest {
  string template_id = 1;
  string file_data = 2;                 // Base64-encoded file content
  string file_name = 3;
}

message L8ImportExecuteResponse {
  int32 total_rows = 1;
  int32 imported_rows = 2;
  int32 failed_rows = 3;
  repeated L8ImportRowError row_errors = 4;
}

message L8ImportRowError {
  int32 row_number = 1;
  string field = 2;
  string error_message = 3;
  string source_value = 4;
}

// Returns target model field metadata for the mapping UI
message L8ImportModelInfoRequest {
  string model_type = 1;
}

message L8ImportModelInfoResponse {
  string model_type = 1;
  repeated L8ImportFieldInfo fields = 2;
}

message L8ImportFieldInfo {
  string field_name = 1;                 // JSON name (camelCase)
  string field_type = 2;                 // "string", "int32", "int64", "bool", "float", "enum", "money", "date"
  bool is_required = 3;
  bool is_primary_key = 4;
  map<string, int32> enum_values = 5;    // If enum: label→value
}

// Export templates as a portable bundle
message L8ImportTemplateExportRequest {
  repeated string template_ids = 1;
}

message L8ImportTemplateExportResponse {
  string export_data = 1;               // JSON string of templates
  string filename = 2;
  int32 template_count = 3;
}

// Import templates from a previously exported bundle
message L8ImportTemplateImportRequest {
  string import_data = 1;               // JSON string from export
  bool overwrite_existing = 2;
}

message L8ImportTemplateImportResponse {
  int32 imported_count = 1;
  int32 skipped_count = 2;
  repeated string imported_names = 3;
  repeated string skipped_names = 4;
}